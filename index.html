<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italiano Quiz Pro 🇮🇹</title>
    <style>
        :root {
            --verde: #008C45;
            --blanco: #FFFFFF;
            --rojo: #CD212A;
            --gris: #333;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; background-color: #f0f4f8; color: var(--gris);
        }

        .category { margin-bottom: 10px; font-size: 14px; color: #777; text-transform: uppercase; letter-spacing: 2px; }

        /* Estilo Tarjeta */
        .card { 
            width: 320px; height: 180px; background: var(--blanco);
            border-radius: 20px; border-bottom: 6px solid var(--verde);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); margin-bottom: 20px;
            padding: 20px; position: relative;
        }

        .word-it { font-size: 32px; font-weight: bold; color: var(--verde); margin: 0; }

        /* Opciones de respuesta */
        .options-container { 
            display: grid; grid-template-columns: 1fr; gap: 10px; width: 320px; 
        }

        .option-btn {
            background: white; border: 2px solid #ddd; padding: 12px;
            border-radius: 12px; cursor: pointer; font-size: 16px; font-weight: 500;
            transition: all 0.2s; text-align: center;
        }

        .option-btn:hover { border-color: var(--verde); background: #f9fffb; }
        .option-btn.correct { background-color: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .option-btn.wrong { background-color: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }

        /* Controles */
        .score-board { margin: 20px 0; font-size: 18px; font-weight: bold; }
        .controls { display: flex; gap: 10px; margin-top: 10px; }
        
        button.action {
            padding: 10px 15px; border-radius: 8px; border: none;
            background: var(--gris); color: white; cursor: pointer; font-weight: bold;
        }

        .btn-audio { background: none; border: none; font-size: 24px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="category" id="category-label">Categoría</div>
    
    <div class="card">
        <p class="word-it" id="word-display">Palabra</p>
        <button class="btn-audio" onclick="speakIt()" title="Escuchar">🔊</button>
    </div>

    <div class="options-container" id="options-box">
        </div>

    <div class="score-board">Puntos: <span id="score-count">0</span></div>

    <div class="controls">
        <button class="action" onclick="shuffleCards()">🔀 Mezclar</button>
        <button class="action" onclick="nextCard()">Siguiente ➡</button>
    </div>

    <script>
        const deck = [
            {it: "Essere", es: "Ser / Estar", cat: "Auxiliar"},
            {it: "Avere", es: "Tener / Haber", cat: "Auxiliar"},
            {it: "Fare", es: "Hacer", cat: "Verbo"},
            {it: "Andare", es: "Ir", cat: "Verbo"},
            {it: "Mangiare", es: "Comer", cat: "Verbo"},
            {it: "Bere", es: "Beber", cat: "Verbo"},
            {it: "Sempre", es: "Siempre", cat: "Adverbio"},
            {it: "Spesso", es: "A menudo", cat: "Adverbio"},
            {it: "Domani", es: "Mañana", cat: "Tiempo"},
            {it: "Oggi", es: "Hoy", cat: "Tiempo"},
            {it: "La città", es: "La ciudad", cat: "Sustantivo"},
            {it: "Il lavoro", es: "El trabajo", cat: "Sustantivo"},
            {it: "Piccolo", es: "Pequeño", cat: "Adjetivo"},
            {it: "Grande", es: "Grande", cat: "Adjetivo"},
            {it: "Capire", es: "Entender", cat: "Verbo"},
            {it: "Scrivere", es: "Escribir", cat: "Verbo"},
            {it: "Dov'è...", es: "Dónde está...", cat: "Frase"},
            {it: "Per favore", es: "Por favor", cat: "Cortesía"},
            {it: "Bello", es: "Bonito", cat: "Adjetivo"},
            {it: "Stanco", es: "Cansado", cat: "Adjetivo"}
        ];

        let currentIndex = 0;
        let score = 0;
        let words = [...deck];
        let canAnswer = true;

        function updateCard() {
            canAnswer = true;
            const currentWord = words[currentIndex];
            document.getElementById('word-display').innerText = currentWord.it;
            document.getElementById('category-label').innerText = currentWord.cat;
            generateOptions(currentWord);
        }

        function generateOptions(correctObj) {
            const optionsBox = document.getElementById('options-box');
            optionsBox.innerHTML = '';
            
            // Crear lista de opciones (la correcta + 3 falsas)
            let choices = [correctObj.es];
            let pool = deck.filter(w => w.es !== correctObj.es);
            
            // Mezclar pool y sacar 3
            pool.sort(() => 0.5 - Math.random());
            choices.push(pool[0].es, pool[1].es, pool[2].es);
            
            // Mezclar las 4 opciones finales
            choices.sort(() => 0.5 - Math.random());

            choices.forEach(choice => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = choice;
                btn.onclick = () => checkAnswer(btn, choice, correctObj.es);
                optionsBox.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected, correct) {
            if (!canAnswer) return;
            canAnswer = false;

            if (selected === correct) {
                btn.classList.add('correct');
                score += 10;
                document.getElementById('score-count').innerText = score;
                setTimeout(nextCard, 1000); // Salta a la siguiente tras un segundo
            } else {
                btn.classList.add('wrong');
                // Mostrar cuál era la correcta
                Array.from(document.getElementsByClassName('option-btn')).forEach(b => {
                    if (b.innerText === correct) b.classList.add('correct');
                });
                setTimeout(nextCard, 2000);
            }
        }

        function nextCard() {
            currentIndex = (currentIndex + 1) % words.length;
            updateCard();
        }

        function shuffleCards() {
            words.sort(() => 0.5 - Math.random());
            currentIndex = 0;
            updateCard();
        }

        function speakIt() {
            const utterance = new SpeechSynthesisUtterance(words[currentIndex].it);
            utterance.lang = 'it-IT';
            window.speechSynthesis.speak(utterance);
        }

        // Iniciar
        updateCard();
    </script>
</body>
</html>
