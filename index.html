<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Italiano Pro: SRS & Contexto 🇮🇹</title>
    <style>
        :root {
            --verde: #008C45; --blanco: #FFFFFF; --rojo: #CD212A; --gris: #333;
            --bg: #f8f9fa;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, sans-serif; background-color: var(--bg);
            display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
        }
        .header { text-align: center; margin-bottom: 20px; }
        .stats { font-size: 0.9rem; color: #666; margin-bottom: 10px; }

        /* Tarjeta */
        .card { 
            width: 100%; max-width: 400px; background: white; border-radius: 20px;
            padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center; margin-bottom: 20px; border-top: 8px solid var(--verde);
        }
        .word-it { font-size: 36px; font-weight: bold; color: var(--verde); margin-bottom: 5px; }
        .category { font-size: 12px; text-transform: uppercase; color: #999; letter-spacing: 2px; }
        
        /* Frase de Contexto */
        .context-box { 
            margin-top: 15px; padding: 10px; background: #f0fdf4; 
            border-radius: 10px; font-style: italic; color: #444; font-size: 15px;
            display: none; /* Se muestra al responder */
        }

        /* Opciones */
        .options-grid { 
            display: grid; grid-template-columns: 1fr; gap: 12px; width: 100%; max-width: 400px; 
        }
        .option-btn {
            background: white; border: 2px solid #eee; padding: 15px;
            border-radius: 12px; cursor: pointer; font-size: 16px; transition: 0.2s;
        }
        .option-btn:hover { border-color: var(--verde); background: #f0fff4; }
        .correct { background-color: #d1fae5 !important; border-color: #10b981 !important; color: #065f46; font-weight: bold; }
        .wrong { background-color: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }

        .btn-audio { 
            background: #eee; border: none; width: 44px; height: 44px; 
            border-radius: 50%; cursor: pointer; margin-top: 10px; font-size: 18px;
        }
        
        .reset-btn { margin-top: 40px; font-size: 11px; color: #ccc; cursor: pointer; border: none; background: none; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Italiano Inteligente</h1>
        <div class="stats">Palabras dominadas: <span id="mastered-count">0</span> / <span id="total-count">0</span></div>
    </div>

    <div class="card">
        <div class="category" id="cat-label">Verbo</div>
        <div class="word-it" id="main-word">Caricamento...</div>
        <button class="btn-audio" onclick="speakIt()">🔊</button>
        <div class="context-box" id="context-box">
            <span id="phrase-it"></span><br>
            <small id="phrase-es" style="color: #888;"></small>
        </div>
    </div>

    <div class="options-grid" id="options-grid"></div>

    <button class="reset-btn" onclick="resetProgress()">Reiniciar todo el progreso</button>

    <script>
        // Base de datos con CONTEXTO (Frases)
        const rawDeck = [
            {it: "Essere", es: "Ser / Estar", cat: "Auxiliar", ctx_it: "Io sono italiano.", ctx_es: "Yo soy italiano."},
            {it: "Avere", es: "Tener / Haber", cat: "Auxiliar", ctx_it: "Io ho un libro.", ctx_es: "Yo tengo un libro."},
            {it: "Prendere", es: "Tomar / Coger", cat: "Verbo", ctx_it: "Prendo un caffè, per favore.", ctx_es: "Tomo un café, por favor."},
            {it: "Andare", es: "Ir", cat: "Verbo", ctx_it: "Vado a casa adesso.", ctx_es: "Voy a casa ahora."},
            {it: "Sempre", es: "Siempre", cat: "Adverbio", ctx_it: "Ti amerò per sempre.", ctx_es: "Te amaré por siempre."},
            {it: "Spesso", es: "A menudo", cat: "Adverbio", ctx_it: "Vado spesso al cinema.", ctx_es: "Voy a menudo al cine."},
            {it: "Capire", es: "Entender", cat: "Verbo", ctx_it: "Non capisco questa parola.", ctx_es: "No entiendo esta palabra."},
            {it: "Trovare", es: "Encontrar", cat: "Verbo", ctx_it: "Non trovo le mie chiavi.", ctx_es: "No encuentro mis llaves."},
            {it: "Dimenticare", es: "Olvidar", cat: "Verbo", ctx_it: "Non dimenticare l'ombrello!", ctx_es: "¡No olvides el paraguas!"},
            {it: "Mela", es: "Manzana", cat: "Sustantivo", ctx_it: "Mangio una mela rossa.", ctx_es: "Como una manzana roja."},
            {it: "Macchina", es: "Coche", cat: "Sustantivo", ctx_it: "La mia macchina è vecchia.", ctx_es: "Mi coche es viejo."},
            {it: "Domani", es: "Mañana", cat: "Tiempo", ctx_it: "Ci vediamo domani mattina.", ctx_es: "Nos vemos mañana por la mañana."}
        ];

        let state = JSON.parse(localStorage.getItem('it_srs_state')) || {
            wordStats: rawDeck.map(w => ({...w, score: 0})), // score 0 = nueva, alto = dominada
        };

        let currentWord = null;
        let canAnswer = true;

        function save() {
            localStorage.setItem('it_srs_state', JSON.stringify(state));
            updateStats();
        }

        function updateStats() {
            const mastered = state.wordStats.filter(w => w.score >= 3).length;
            document.getElementById('mastered-count').innerText = mastered;
            document.getElementById('total-count').innerText = state.wordStats.length;
        }

        function getNextWord() {
            // LÓGICA SRS: Ordenamos por score (las de menor score salen primero)
            // Añadimos un poco de aleatoriedad entre las 5 con menor puntuación
            let pool = [...state.wordStats].sort((a, b) => a.score - b.score).slice(0, 5);
            return pool[Math.floor(Math.random() * pool.length)];
        }

        function renderQuiz() {
            canAnswer = true;
            currentWord = getNextWord();
            document.getElementById('main-word').innerText = currentWord.it;
            document.getElementById('cat-label').innerText = currentWord.cat;
            document.getElementById('context-box').style.display = 'none';
            
            // Generar opciones
            const grid = document.getElementById('options-grid');
            grid.innerHTML = '';
            
            let choices = [currentWord.es];
            let distractors = rawDeck.filter(d => d.es !== currentWord.es)
                                     .sort(() => 0.5 - Math.random())
                                     .slice(0, 3)
                                     .map(d => d.es);
            
            choices = [...choices, ...distractors].sort(() => 0.5 - Math.random());

            choices.forEach(text => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = text;
                btn.onclick = () => checkAnswer(btn, text);
                grid.appendChild(btn);
            });
        }

        function checkAnswer(btn, selected) {
            if (!canAnswer) return;
            canAnswer = false;

            const isCorrect = (selected === currentWord.es);
            
            // Actualizar SRS Score
            const wordInState = state.wordStats.find(w => w.it === currentWord.it);
            if (isCorrect) {
                btn.classList.add('correct');
                wordInState.score += 1;
            } else {
                btn.classList.add('wrong');
                wordInState.score = Math.max(0, wordInState.score - 2); // Castigo por error
                // Mostrar correcta
                Array.from(document.getElementsByClassName('option-btn')).forEach(b => {
                    if (b.innerText === currentWord.es) b.classList.add('correct');
                });
            }

            // Mostrar Contexto
            document.getElementById('phrase-it').innerText = currentWord.ctx_it;
            document.getElementById('phrase-es').innerText = currentWord.ctx_es;
            document.getElementById('context-box').style.display = 'block';

            save();
            setTimeout(renderQuiz, isCorrect ? 1800 : 3500); // Más tiempo si falla para leer contexto
        }

        function speakIt() {
            const ut = new SpeechSynthesisUtterance(currentWord.it);
            ut.lang = 'it-IT';
            window.speechSynthesis.speak(ut);
        }

        function resetProgress() {
            if(confirm("¿Seguro que quieres borrar todo tu progreso?")) {
                localStorage.removeItem('it_srs_state');
                location.reload();
            }
        }

        // Inicio
        updateStats();
        renderQuiz();
    </script>
</body>
</html>
